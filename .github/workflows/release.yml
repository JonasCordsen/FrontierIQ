name: Release Build and Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  release-build-and-deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run full test suite
        run: node --test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_AZURE_TENANT_ID: ${{ secrets.NEXT_PUBLIC_AZURE_TENANT_ID }}
          NEXT_PUBLIC_AZURE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_AZURE_CLIENT_ID }}

      - name: Generate OpenAPI artifact
        run: |
          mkdir -p artifacts
          node --input-type=module -e "import { buildOpenApiPublicationBundle } from './src/optimize/delivery/openapi-publication-contract.mjs'; const bundle = buildOpenApiPublicationBundle({ generatedAt: '1970-01-01T00:00:00.000Z' }); await import('node:fs/promises').then(fs => fs.writeFile('artifacts/frontieriq-openapi.json', bundle.artifact.content, 'utf8')); await import('node:fs/promises').then(fs => fs.writeFile('artifacts/frontieriq-openapi-summary.json', JSON.stringify(bundle.summary, null, 2), 'utf8'));"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontieriq-release-artifacts
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

      - name: Deploy to Azure Static Web Apps (Production)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend'
          output_location: '.next'
          skip_app_build: true
