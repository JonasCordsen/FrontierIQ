name: Release Validation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run full test suite
        run: node --test

      - name: Generate OpenAPI artifact
        run: |
          mkdir -p artifacts
          node --input-type=module -e "import { buildOpenApiPublicationBundle } from './src/optimize/delivery/openapi-publication-contract.mjs'; const bundle = buildOpenApiPublicationBundle({ generatedAt: '1970-01-01T00:00:00.000Z' }); await import('node:fs/promises').then(fs => fs.writeFile('artifacts/frontieriq-openapi.json', bundle.artifact.content, 'utf8')); await import('node:fs/promises').then(fs => fs.writeFile('artifacts/frontieriq-openapi-summary.json', JSON.stringify(bundle.summary, null, 2), 'utf8'));"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontieriq-release-artifacts
          path: artifacts/
