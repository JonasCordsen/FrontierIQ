name: CI

on:
  push:
    branches: [ main, 'jonascordsen-scaffold-src-structure' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install
        run: |
          cd frontend
          npm ci
      - name: Build
        run: |
          cd frontend
          npm run build
